map $http_x_request_id $request_id_value {
    default $http_x_request_id;
    "" $request_id;
}

log_format with_request_id '$remote_addr - $remote_user [$time_local] "$request" '
                           '$status $body_bytes_sent "$http_referer" '
                           '"$http_user_agent" "$http_x_forwarded_for" '
                           'request_id="$request_id_value"';

upstream api_servers {
    server api:3000;
}

server {
    listen 80;

    access_log /var/log/nginx/access.log with_request_id;

    location / {
        proxy_pass http://api_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id_value;
    }
}
