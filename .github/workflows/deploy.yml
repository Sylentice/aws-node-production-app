name: Deploy to EC2
name: Deploy to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Run automated tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Check JavaScript syntax
        run: |
          node --check server.js
          node --check app.js
          node --check db.js

      - name: Check deployment script syntax
        run: |
          bash -n scripts/verify_deployment.sh
          bash -n scripts/record_deployment.sh
          bash -n scripts/deployment_status.sh
          bash -n scripts/install_deployment_logrotate.sh
          bash -n scripts/smoke_test.sh

      - name: Build API image
        run: docker build -t myapp-api:ci .

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            previous_commit="unknown"
            new_commit="unknown"
            deployment_final_event_recorded=false

            log_unexpected_failure() {
              exit_code=$?

              if [ "$exit_code" -ne 0 ] && [ "$deployment_final_event_recorded" != "true" ]; then
                echo "Deployment exited unexpectedly with code $exit_code"

                if [ -x ./scripts/record_deployment.sh ]; then
                  ./scripts/record_deployment.sh "failed" "$new_commit" "$previous_commit" "deployment exited unexpectedly with code $exit_code" || true
                else
                  echo "record_deployment.sh was not available to log failure"
                fi
              fi
            }

            if ! command -v flock >/dev/null 2>&1; then
              echo "flock is not installed on this server"
              exit 1
            fi

            exec 9>/tmp/myapp-deploy.lock

            if ! flock -n 9; then
              echo "Another deployment is already running. Exiting."
              exit 1
            fi

            echo "Acquired deployment lock"

            cd /var/www/myapp

            trap log_unexpected_failure EXIT

            previous_commit=$(git rev-parse HEAD)
            echo "Previous deployed commit: $previous_commit"

            git fetch origin main
            git reset --hard origin/main

            new_commit=$(git rev-parse HEAD)
            echo "Deploying commit: $new_commit"

            ./scripts/record_deployment.sh "started" "$new_commit" "$previous_commit" "deployment started"

            rollback() {
              echo "Deployment failed. Rolling back to previous commit: $previous_commit"

              git reset --hard "$previous_commit"

              if ! GIT_COMMIT="$previous_commit" docker-compose up -d --build --scale api=3 --remove-orphans; then
                echo "Rollback docker-compose update failed"
                ./scripts/record_deployment.sh "rollback_failed" "$new_commit" "$previous_commit" "rollback docker-compose update failed" || true
                docker ps
                docker-compose logs --tail=50
                deployment_final_event_recorded=true
                exit 1
              fi

              echo "Verifying rollback..."

              if ./scripts/verify_deployment.sh "$previous_commit"; then
                echo "Rollback completed successfully"
                ./scripts/record_deployment.sh "rollback_success" "$new_commit" "$previous_commit" "rolled back to previous commit"
              else
                echo "Rollback verification failed"
                ./scripts/record_deployment.sh "rollback_failed" "$new_commit" "$previous_commit" "rollback verification failed" || true
                docker ps
                docker-compose logs --tail=50
              fi

              deployment_final_event_recorded=true
              exit 1
            }

            if ! GIT_COMMIT="$new_commit" docker-compose up -d --build --scale api=3 --remove-orphans; then
              rollback
            fi

            if ! ./scripts/verify_deployment.sh "$new_commit"; then
              docker-compose logs --tail=50
              rollback
            fi

            if ! ./scripts/smoke_test.sh "$new_commit"; then
              docker-compose logs --tail=50
              rollback
            fi

            ./scripts/record_deployment.sh "success" "$new_commit" "$previous_commit" "deployment completed successfully"

            echo "Deployment completed successfully for commit: $new_commit"
            docker ps

            deployment_final_event_recorded=true
