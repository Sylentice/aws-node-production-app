name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Run automated tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Check JavaScript syntax
        run: |
          node --check server.js
          node --check app.js
          node --check db.js

      - name: Check deployment verification script syntax
        run: bash -n scripts/verify_deployment.sh

      - name: Build API image
        run: docker build -t myapp-api:ci .

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /var/www/myapp

            previous_commit=$(git rev-parse HEAD)
            echo "Previous deployed commit: $previous_commit"

            git fetch origin main
            git reset --hard origin/main

            new_commit=$(git rev-parse HEAD)
            echo "Deploying commit: $new_commit"

            rollback() {
              echo "Deployment failed. Rolling back to previous commit: $previous_commit"

              git reset --hard "$previous_commit"

              if ! GIT_COMMIT="$previous_commit" docker-compose up -d --build --scale api=3 --remove-orphans; then
                echo "Rollback docker-compose update failed"
                docker ps
                docker-compose logs --tail=50
                exit 1
              fi

              echo "Verifying rollback..."

              if ./scripts/verify_deployment.sh "$previous_commit"; then
                echo "Rollback completed successfully"
              else
                echo "Rollback verification failed"
                docker ps
                docker-compose logs --tail=50
              fi

              exit 1
            }

            if ! GIT_COMMIT="$new_commit" docker-compose up -d --build --scale api=3 --remove-orphans; then
              rollback
            fi

            if ! ./scripts/verify_deployment.sh "$new_commit"; then
              docker-compose logs --tail=50
              rollback
            fi

            echo "Deployment completed successfully for commit: $new_commit"
            docker ps
