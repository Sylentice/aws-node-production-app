name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Run automated tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Check JavaScript syntax
        run: |
          node --check server.js
          node --check app.js
          node --check db.js

      - name: Build API image
        run: docker build -t myapp-api:ci .

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /var/www/myapp

            previous_commit=$(git rev-parse HEAD)
            echo "Previous deployed commit: $previous_commit"

            git fetch origin main
            git reset --hard origin/main

            new_commit=$(git rev-parse HEAD)
            echo "Deploying commit: $new_commit"

            wait_for_ready() {
              label="$1"
              ready=false

              for i in $(seq 1 12); do
                if curl -fsS http://localhost/ready; then
                  echo
                  echo "$label is ready"
                  ready=true
                  break
                fi

                echo "$label readiness attempt $i failed; retrying..."
                sleep 5
              done

              if [ "$ready" != "true" ]; then
                return 1
              fi
            }

            verify_api_count() {
              api_count=$(docker-compose ps -q api | wc -l)

              if [ "$api_count" -ne 3 ]; then
                echo "Expected 3 API containers, found $api_count"
                docker ps
                return 1
              fi

              echo "Verified 3 API containers"
            }

            verify_version() {
              expected_commit="$1"

              echo "Verifying deployed version reports commit: $expected_commit"

              version_response=$(curl -fsS http://localhost/version || true)

              if [ -z "$version_response" ]; then
                echo "Version endpoint did not return a response"
                return 1
              fi

              echo "$version_response"

              if ! echo "$version_response" | grep -q "$expected_commit"; then
                echo "Version verification failed. Expected commit was not found in /version response."
                return 1
              fi

              echo "Verified deployed version commit"
            }

            rollback() {
              echo "Deployment failed. Rolling back to previous commit: $previous_commit"

              git reset --hard "$previous_commit"

              GIT_COMMIT="$previous_commit" docker-compose up -d --build --scale api=3 --remove-orphans

              echo "Waiting for rollback readiness..."

              if wait_for_ready "Rollback"; then
                if verify_version "$previous_commit"; then
                  echo "Rollback completed successfully"
                else
                  echo "Rollback became ready but version verification failed"
                fi

                docker ps
              else
                echo "Rollback failed to become ready"
                docker ps
                docker-compose logs --tail=50
              fi

              exit 1
            }

            if ! GIT_COMMIT="$new_commit" docker-compose up -d --build --scale api=3 --remove-orphans; then
              rollback
            fi

            echo "Waiting for application readiness..."

            if ! wait_for_ready "Application"; then
              docker-compose logs --tail=50
              rollback
            fi

            if ! verify_api_count; then
              rollback
            fi

            if ! verify_version "$new_commit"; then
              rollback
            fi

            docker ps
